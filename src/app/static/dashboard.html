<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>NodeGuard Security Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }
        
        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00ff88, #00d4ff, #ff0080);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        
        .header .subtitle {
            font-size: 1.2rem;
            color: #8892b0;
            font-weight: 300;
        }
        
        .status-indicator {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 136, 0.1);
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .metric-card {
            background: rgba(15, 15, 35, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .metric-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 255, 255, 0.1);
        }
        
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00ff88, #00d4ff, #ff0080);
        }
        
        .metric-icon {
            width: 50px;
            height: 50px;
            margin-bottom: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .metric-requests .metric-icon {
            background: linear-gradient(45deg, #667eea, #764ba2);
        }
        
        .metric-blocked .metric-icon {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
        }
        
        .metric-forwarded .metric-icon {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
        }
        
        .metric-title {
            font-size: 0.9rem;
            color: #8892b0;
            font-weight: 500;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
        }
        
        .metric-change {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .metric-change.positive {
            color: #00ff88;
        }
        
        .metric-change.negative {
            color: #ff6b6b;
        }
        
        .events-panel {
            background: rgba(15, 15, 35, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .events-header {
            padding: 25px;
            background: linear-gradient(90deg, rgba(0, 255, 136, 0.1), rgba(0, 212, 255, 0.1));
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }
        
        .events-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .events-list {
            max-height: 500px;
            overflow-y: auto;
            padding: 0;
        }
        
        .events-list::-webkit-scrollbar {
            width: 8px;
        }
        
        .events-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        
        .events-list::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.3);
            border-radius: 4px;
        }
        
        .event {
            padding: 15px 25px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
            transition: background-color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .event:hover {
            background: rgba(0, 255, 255, 0.05);
        }
        
        .event-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .event-content {
            flex: 1;
            min-width: 0;
        }
        
        .event-time {
            font-size: 0.8rem;
            color: #00ff88;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .event-text {
            font-size: 0.9rem;
            color: #ccd6f6;
            word-wrap: break-word;
        }
        
        .connecting {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #8892b0;
            font-size: 1.1rem;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .threat-level {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .threat-low {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .threat-medium {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }
        
        .threat-high {
            background: rgba(255, 65, 108, 0.2);
            color: #ff416c;
            border: 1px solid rgba(255, 65, 108, 0.3);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .metrics-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .status-indicator {
                position: relative;
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    
    <div class="container">
        <div class="header">
            <h1>🛡️ NodeGuard</h1>
            <p class="subtitle">Advanced Cybersecurity Firewall Dashboard</p>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>System Active</span>
            </div>
        </div>
        
        <div class="metrics-grid">
            <div class="metric-card metric-requests">
                <div class="metric-icon">📊</div>
                <div class="metric-title">Total Requests</div>
                <div class="metric-value" id="totalReq">-</div>
                <div class="metric-change positive">
                    <span>↗</span> Real-time monitoring
                </div>
            </div>
            
            <div class="metric-card metric-blocked">
                <div class="metric-icon">🚫</div>
                <div class="metric-title">Threats Blocked</div>
                <div class="metric-value" id="blocked">-</div>
                <div class="metric-change negative">
                    <span>🛡️</span> Security active
                </div>
            </div>
            
            <div class="metric-card metric-forwarded">
                <div class="metric-icon">✅</div>
                <div class="metric-title">Safe Transactions</div>
                <div class="metric-value" id="txs">-</div>
                <div class="metric-change positive">
                    <span>🔒</span> Verified & forwarded
                </div>
            </div>
        </div>
        
        <div class="events-panel">
            <div class="events-header">
                <h3>🔍 Security Events Monitor</h3>
            </div>
            <div class="events-list" id="eventsList">
                <div class="connecting">
                    <div class="spinner"></div>
                    Establishing secure connection...
                </div>
            </div>
        </div>
    </div>

    <script>
        const es = new EventSource('/events');
        const eventsList = document.getElementById('eventsList');
        
        function getEventIcon(type) {
            const icons = {
                'block': '🚫',
                'allow': '✅',
                'scan': '🔍',
                'alert': '⚠️',
                'threat': '💀',
                'safe': '🛡️'
            };
            return icons[type] || '📡';
        }
        
        function getEventClass(type) {
            if (type.includes('block') || type.includes('threat')) return 'threat-high';
            if (type.includes('scan') || type.includes('alert')) return 'threat-medium';
            return 'threat-low';
        }
        
        function formatTimestamp(ts) {
            try {
                const date = new Date(ts);
                return date.toLocaleTimeString('es-ES', { 
                    hour12: false,
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
            } catch(e) {
                return ts;
            }
        }
        
        es.onmessage = function(e) {
            try {
                const msg = JSON.parse(e.data);
                
                if(msg.type === 'recent') {
                    eventsList.innerHTML = '';
                    for(const it of msg.data.slice(0, 50)) {
                        const el = document.createElement('div');
                        el.className = 'event';
                        
                        const icon = getEventIcon(it.type);
                        const eventClass = getEventClass(it.type);
                        const time = formatTimestamp(it.ts);
                        
                        el.innerHTML = `
                            <div class="event-icon" style="background: rgba(0, 255, 255, 0.1);">${icon}</div>
                            <div class="event-content">
                                <div class="event-time">${time}</div>
                                <div class="event-text">
                                    <span class="threat-level ${eventClass}">${it.type}</span>
                                    ${JSON.stringify(it.payload)}
                                </div>
                            </div>
                        `;
                        eventsList.appendChild(el);
                    }
                } else if(msg.type === 'ping') {
                    // Mantener conexión activa
                } else {
                    const el = document.createElement('div');
                    el.className = 'event';
                    
                    const icon = getEventIcon(msg.type || 'info');
                    const eventClass = getEventClass(msg.type || 'info');
                    const time = new Date().toLocaleTimeString('es-ES', { 
                        hour12: false,
                        hour: '2-digit', 
                        minute: '2-digit', 
                        second: '2-digit' 
                    });
                    
                    el.innerHTML = `
                        <div class="event-icon" style="background: rgba(0, 255, 136, 0.1);">${icon}</div>
                        <div class="event-content">
                            <div class="event-time">${time}</div>
                            <div class="event-text">
                                <span class="threat-level ${eventClass}">NEW EVENT</span>
                                ${JSON.stringify(msg)}
                            </div>
                        </div>
                    `;
                    eventsList.insertBefore(el, eventsList.firstChild);
                }
            } catch(err) {
                console.error('Error parsing event:', err);
            }
        };
        
        async function fetchMetrics() {
            try {
                const r = await fetch('/metrics');
                const text = await r.text();
                
                const totalReq = (text.match(/baf_jsonrpc_requests_total\{[^}]*\}\s+(\d+(?:\.\d+)?)/) || ['','-'])[1];
                const blocked = (text.match(/baf_jsonrpc_blocked_total\{[^}]*\}\s+(\d+(?:\.\d+)?)/) || ['','-'])[1];
                // Approximate forwarded as total - blocked if both are numbers
                const forwarded = (Number(totalReq) - Number(blocked));
                const txs = isNaN(forwarded) ? '-' : String(Math.max(0, forwarded));
                
                // Animación de números
                animateValue('totalReq', totalReq);
                animateValue('blocked', blocked);
                animateValue('txs', txs);
                
            } catch(e) {
                console.error('Error fetching metrics:', e);
            }
        }
        
        function animateValue(id, newValue) {
            const element = document.getElementById(id);
            if (element && newValue !== '-') {
                element.style.transform = 'scale(1.1)';
                element.textContent = newValue;
                setTimeout(() => {
                    element.style.transform = 'scale(1)';
                }, 200);
            } else if (element) {
                element.textContent = newValue;
            }
        }
        
        // Error de conexión EventSource
        es.onerror = function() {
            if (eventsList.children.length === 1 && eventsList.children[0].classList.contains('connecting')) {
                eventsList.innerHTML = `
                    <div class="event">
                        <div class="event-icon" style="background: rgba(255, 65, 108, 0.2);">⚠️</div>
                        <div class="event-content">
                            <div class="event-time">${new Date().toLocaleTimeString('es-ES')}</div>
                            <div class="event-text">
                                <span class="threat-level threat-high">CONNECTION ERROR</span>
                                Reconnecting to event stream...
                            </div>
                        </div>
                    </div>
                `;
            }
        };
        
        setInterval(fetchMetrics, 2000);
        fetchMetrics();
    </script>
</body>
</html>
